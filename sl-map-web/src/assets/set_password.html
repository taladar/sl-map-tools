<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sl-map-web — set password</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="auth-page">
    <header>
      <h1>sl-map-web</h1>
      <p>Set the password for your account.</p>
    </header>

    <section class="auth-card">
      <h2>Choose a password</h2>
      <p id="setpw-status" class="status"></p>
      <form id="setpw-form" autocomplete="on">
        <label
          >New password (at least 8 characters)
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="new-password"
            minlength="8"
            required
          />
        </label>
        <label
          >Confirm password
          <input
            type="password"
            id="confirm"
            name="confirm"
            autocomplete="new-password"
            minlength="8"
            required
          />
        </label>
        <div class="row buttons">
          <button type="submit">Set password</button>
        </div>
      </form>
      <p class="note">
        The link in the URL is single-use and expires after a short time. If
        this page reports an invalid token, click the in-world object again
        to receive a fresh link.
      </p>
    </section>

    <script>
      const form = document.getElementById("setpw-form");
      const statusEl = document.getElementById("setpw-status");
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token") || "";

      if (!token) {
        statusEl.textContent =
          "Missing token. Click the in-world object again to receive a fresh link.";
        form.querySelector("button").disabled = true;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirm").value;
        if (password !== confirm) {
          statusEl.textContent = "Passwords do not match.";
          return;
        }
        statusEl.textContent = "Saving…";
        try {
          const resp = await fetch("/api/auth/set-password", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ token, new_password: password }),
          });
          if (!resp.ok) {
            const data = await resp.json().catch(() => ({}));
            throw new Error(data.error || `HTTP ${resp.status}`);
          }
          statusEl.textContent = "Password set — redirecting to sign in…";
          setTimeout(() => window.location.assign("/login"), 1000);
        } catch (err) {
          statusEl.textContent = `Could not set password: ${err.message}`;
        }
      });
    </script>
  </body>
</html>
