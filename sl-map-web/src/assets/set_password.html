<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sl-map-web — set password</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="auth-page">
    <header>
      <h1>sl-map-web</h1>
      <p>Set the password for your account.</p>
    </header>

    <section class="auth-card">
      <h2>Choose a password</h2>
      <p id="setpw-status" class="status"></p>
      <form id="setpw-form" autocomplete="on">
        <label
          >New password (at least 8 characters)
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="new-password"
            minlength="8"
            required
          />
        </label>
        <label
          >Confirm password
          <input
            type="password"
            id="confirm"
            name="confirm"
            autocomplete="new-password"
            minlength="8"
            required
          />
        </label>
        <div class="row buttons">
          <button type="submit">Set password</button>
        </div>
      </form>
      <p class="note">
        The link in the URL is single-use and expires after a short time. If
        this page reports an invalid token, click the in-world object again
        to receive a fresh link.
      </p>
    </section>

    <script src="/static/set_password.js"></script>
  </body>
</html>
